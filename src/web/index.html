<!DOCTYPE html>
<html lang="en" data-theme="__THEME__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReelHook</title>
  <script>
    // Apply a saved per-browser theme before the stylesheet paints (no flash).
    // Falls back to the server-rendered default on the <html> element.
    (function () {
      try {
        var t = localStorage.getItem("reelhook.theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span>ReelHook</span>
    </div>
    <div class="topbar-actions">
      <button id="themeBtn" class="btn ghost" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon" id="themeIcon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        <span>Theme</span>
      </button>
      <button id="newFolderBtn" class="btn ghost" title="New folder" aria-label="New folder">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        <span>New folder</span>
      </button>
      <button id="uploadBtn" class="btn" title="Upload" aria-label="Upload">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload</span>
      </button>
      <form method="POST" action="/logout" class="logout-form">
        <button type="submit" class="btn ghost" title="Sign out" aria-label="Sign out">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign out</span>
        </button>
      </form>
    </div>
  </header>

  <input type="file" id="fileInput" multiple hidden>

  <div class="toolbar">
    <nav class="crumbs" id="crumbs"></nav>
    <div class="toolbar-right">
      <div class="filter-wrap">
        <svg class="icon filter-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="filterInput" class="filter-input" placeholder="Filter…" autocomplete="off" spellcheck="false">
      </div>
      <label class="pagesize">
        <span>Show</span>
        <select id="pageSize" title="Items per page">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
        </select>
      </label>
    </div>
  </div>

  <div class="bulkbar" id="bulkbar" hidden></div>

  <main id="dropZone" class="filearea">
    <div class="droplay" id="droplay"><span>Drop files to upload</span></div>
    <table class="filetable">
      <thead>
        <tr>
          <th class="col-check"><input type="checkbox" id="selectAll" title="Select all"></th>
          <th class="col-name sortable" data-sort="name">Name<span class="arrow"></span></th>
          <th class="col-kind sortable" data-sort="kind">Kind<span class="arrow"></span></th>
          <th class="col-size sortable" data-sort="size">Size<span class="arrow"></span></th>
          <th class="col-mod sortable" data-sort="mod">Modified<span class="arrow"></span></th>
          <th class="col-act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="empty" id="empty" hidden>This folder is empty.</p>
    <nav class="pager" id="pager" hidden></nav>
  </main>

  <div id="uploadStatus" class="upload-status" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
